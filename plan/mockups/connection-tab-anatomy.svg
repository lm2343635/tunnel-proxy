<svg xmlns="http://www.w3.org/2000/svg" width="720" height="500" viewBox="0 0 720 500" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="aGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#32d74b" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#32d74b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aKnob" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f0f6f1"/>
    </linearGradient>
    <marker id="aArrow" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto">
      <path d="M9 0 L0 4.5 L9 9 z" fill="#8a93a6"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="#ffffff"/>

  <!-- window column (left) -->
  <rect x="200" y="20" width="320" height="460" rx="12" fill="#f6f7f9" stroke="#d7dbe1"/>
  <!-- titlebar -->
  <rect x="200" y="20" width="320" height="34" rx="12" fill="#eceef1"/>
  <rect x="200" y="44" width="320" height="10" fill="#eceef1"/>
  <circle cx="220" cy="37" r="5" fill="#ff5f57"/><circle cx="236" cy="37" r="5" fill="#febc2e"/><circle cx="252" cy="37" r="5" fill="#28c840"/>
  <!-- tab strip -->
  <rect x="200" y="54" width="320" height="40" fill="#f4f5f7"/>
  <line x1="200" y1="94" x2="520" y2="94" stroke="#e0e2e6"/>
  <rect x="208" y="61" width="70" height="26" rx="6" fill="#e2e6ec"/>
  <g font-size="8.5" text-anchor="middle" fill="#4b5563">
    <text x="243" y="83" fill="#1f6bff" font-weight="700">Connection</text>
    <text x="300" y="83">Servers</text><text x="350" y="83">Tunnel</text>
    <text x="392" y="83">Logs</text><text x="428" y="83">Stats</text><text x="478" y="83">···</text>
  </g>

  <!-- power toggle -->
  <circle cx="360" cy="176" r="78" fill="url(#aGlow)"/>
  <circle cx="360" cy="176" r="44" fill="none" stroke="#eaf3ec" stroke-width="9"/>
  <circle cx="360" cy="176" r="44" fill="none" stroke="#32d74b" stroke-width="9" stroke-linecap="round"/>
  <circle cx="360" cy="176" r="33" fill="url(#aKnob)" stroke="#e3ede5"/>
  <path d="M348 165 a16 16 0 1 0 24 0" fill="none" stroke="#1f9d3a" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="360" y1="159" x2="360" y2="177" stroke="#1f9d3a" stroke-width="3.4" stroke-linecap="round"/>

  <!-- status -->
  <text x="360" y="262" font-size="17" font-weight="800" fill="#0d223d" text-anchor="middle">Connected</text>
  <text x="360" y="280" font-size="10.5" fill="#5b6b82" text-anchor="middle">Tunnel + HTTP proxy active</text>
  <!-- chip -->
  <rect x="278" y="292" width="164" height="30" rx="8" fill="#ffffff" stroke="#d7ecdb"/>
  <text x="292" y="305" font-size="8" fill="#7d8697">EXIT IP</text>
  <text x="292" y="317" font-size="11" font-weight="700" fill="#0a3d91" font-family="'SF Mono', Menlo, monospace">203.0.113.47</text>
  <!-- server -->
  <rect x="278" y="330" width="164" height="24" rx="6" fill="#ffffff" stroke="#d7dbe1"/>
  <text x="292" y="346" font-size="10.5" fill="#1f2937">server-a ▾</text>
  <!-- quick options -->
  <rect x="256" y="366" width="208" height="60" rx="9" fill="#ffffff" stroke="#e6e8ec"/>
  <text x="270" y="386" font-size="9.5" fill="#1f2937">Route Mac traffic through proxy</text>
  <rect x="428" y="378" width="28" height="15" rx="7.5" fill="#28c840"/><circle cx="448" cy="385.5" r="6" fill="#fff"/>
  <line x1="270" y1="402" x2="450" y2="402" stroke="#eef0f3"/>
  <text x="270" y="418" font-size="9.5" fill="#1f2937">Auto-reconnect (watchdog)</text>
  <rect x="428" y="410" width="28" height="15" rx="7.5" fill="#28c840"/><circle cx="448" cy="417.5" r="6" fill="#fff"/>

  <!-- ===== annotations ===== -->
  <g font-size="12" fill="#3c4250">
    <!-- power toggle (left) -->
    <line x1="316" y1="176" x2="188" y2="176" stroke="#8a93a6" marker-end="url(#aArrow)"/>
    <text x="20" y="164" font-weight="700" fill="#1f9d3a">Power toggle</text>
    <text x="20" y="179" font-size="10.5" fill="#7d8697">large circular button;</text>
    <text x="20" y="193" font-size="10.5" fill="#7d8697">ring animates by state</text>
    <text x="20" y="207" font-size="10.5" fill="#7d8697">(sweep→fill→breathe)</text>

    <!-- status (left) -->
    <line x1="300" y1="258" x2="188" y2="258" stroke="#8a93a6" marker-end="url(#aArrow)"/>
    <text x="20" y="255" font-weight="700">Status + subtitle</text>
    <text x="20" y="270" font-size="10.5" fill="#7d8697">cross-fades on change</text>

    <!-- chip (right) -->
    <line x1="442" y1="307" x2="556" y2="307" stroke="#8a93a6" marker-end="url(#aArrow)"/>
    <text x="562" y="300" font-weight="700">Exit-IP chip</text>
    <text x="562" y="315" font-size="10.5" fill="#7d8697">fades in when connected</text>

    <!-- server (right) -->
    <line x1="442" y1="342" x2="556" y2="342" stroke="#8a93a6" marker-end="url(#aArrow)"/>
    <text x="562" y="345" font-weight="700">Server picker</text>

    <!-- quick options (right) -->
    <line x1="464" y1="400" x2="556" y2="400" stroke="#8a93a6" marker-end="url(#aArrow)"/>
    <text x="562" y="390" font-weight="700" fill="#0a3d91">Quick options</text>
    <text x="562" y="405" font-size="10.5" fill="#7d8697">macOS SOCKS proxy +</text>
    <text x="562" y="419" font-size="10.5" fill="#7d8697">watchdog, right here</text>
  </g>
</svg>
