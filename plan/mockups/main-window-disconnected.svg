<svg xmlns="http://www.w3.org/2000/svg" width="720" height="640" viewBox="0 0 720 640" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#f2f3f5"/>
    </linearGradient>
    <linearGradient id="heroOff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f5f7"/>
      <stop offset="1" stop-color="#eceef1"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3898ff"/>
      <stop offset="1" stop-color="#0a84ff"/>
    </linearGradient>
    <filter id="ws" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="cardsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="720" height="640" fill="#2c3446"/>

  <g filter="url(#ws)">
    <rect x="200" y="24" width="320" height="592" rx="12" fill="url(#win)" stroke="#dcdfe4"/>
  </g>

  <!-- titlebar -->
  <rect x="200" y="24" width="320" height="40" rx="12" fill="#eceef1"/>
  <rect x="200" y="52" width="320" height="12" fill="#eceef1"/>
  <circle cx="222" cy="44" r="6" fill="#ff5f57"/>
  <circle cx="242" cy="44" r="6" fill="#febc2e"/>
  <circle cx="262" cy="44" r="6" fill="#28c840"/>
  <text x="360" y="48" font-size="13" font-weight="700" fill="#3c4250" text-anchor="middle">Tunnel Proxy</text>

  <!-- ===== HERO (disconnected) ===== -->
  <rect x="216" y="80" width="288" height="128" rx="12" fill="url(#heroOff)" stroke="#e0e3e8"/>
  <circle cx="240" cy="110" r="7" fill="#9aa3b2"/>
  <text x="256" y="116" font-size="18" font-weight="800" fill="#3c4250">Disconnected</text>
  <text x="234" y="140" font-size="11.5" fill="#8a93a6">Traffic goes out directly</text>
  <!-- last connected chip -->
  <rect x="234" y="152" width="128" height="42" rx="8" fill="#ffffff" stroke="#e0e3e8"/>
  <text x="248" y="170" font-size="10" fill="#9aa3b2">Last connected</text>
  <text x="248" y="186" font-size="12" font-weight="700" fill="#3c4250">Today 09:41</text>
  <!-- server chip -->
  <rect x="370" y="152" width="118" height="42" rx="8" fill="#ffffff" stroke="#e0e3e8"/>
  <text x="384" y="170" font-size="10" fill="#9aa3b2">Server</text>
  <text x="384" y="186" font-size="12" font-weight="700" fill="#3c4250">server-a ▾</text>

  <!-- big CTA (Connect / blue) -->
  <rect x="216" y="224" width="288" height="44" rx="10" fill="url(#cta)"/>
  <text x="360" y="251" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">Connect</text>

  <!-- ===== PREFERENCES CARD ===== -->
  <text x="216" y="296" font-size="11" font-weight="700" fill="#8a93a6" letter-spacing="0.4">PREFERENCES</text>
  <g filter="url(#cardsh)">
    <rect x="216" y="304" width="288" height="176" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
  </g>
  <g font-size="12.5" fill="#1f2937">
    <text x="232" y="332">Auto-reconnect (watchdog)</text>
    <rect x="452" y="322" width="40" height="22" rx="11" fill="#28c840"/><circle cx="481" cy="333" r="9" fill="#fff"/>
    <line x1="232" y1="352" x2="488" y2="352" stroke="#eef0f3"/>

    <text x="232" y="374">Show network speed</text>
    <rect x="452" y="364" width="40" height="22" rx="11" fill="#d1d5db"/><circle cx="463" cy="375" r="9" fill="#fff"/>
    <line x1="232" y1="394" x2="488" y2="394" stroke="#eef0f3"/>

    <text x="232" y="416">macOS SOCKS proxy</text>
    <rect x="452" y="406" width="40" height="22" rx="11" fill="#d1d5db"/><circle cx="463" cy="417" r="9" fill="#fff"/>
    <line x1="232" y1="436" x2="488" y2="436" stroke="#eef0f3"/>

    <text x="232" y="458">Launch at login</text>
    <rect x="452" y="448" width="40" height="22" rx="11" fill="#d1d5db"/><circle cx="463" cy="459" r="9" fill="#fff"/>
  </g>

  <!-- ===== MENU BAR CARD ===== -->
  <text x="216" y="504" font-size="11" font-weight="700" fill="#8a93a6" letter-spacing="0.4">MENU BAR</text>
  <g filter="url(#cardsh)">
    <rect x="216" y="512" width="288" height="40" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
  </g>
  <text x="232" y="537" font-size="12.5" fill="#1f2937">Show menu bar icon</text>
  <rect x="452" y="526" width="40" height="22" rx="11" fill="#28c840"/><circle cx="481" cy="537" r="9" fill="#fff"/>

  <!-- ===== QUICK ACTIONS ===== -->
  <g font-size="12" text-anchor="middle">
    <rect x="216" y="568" width="66" height="32" rx="8" fill="#eef1f5" stroke="#dfe3e9"/>
    <text x="249" y="588" fill="#374151">Logs</text>
    <rect x="290" y="568" width="66" height="32" rx="8" fill="#eef1f5" stroke="#dfe3e9"/>
    <text x="323" y="588" fill="#374151">Stats</text>
    <rect x="364" y="568" width="66" height="32" rx="8" fill="#eef1f5" stroke="#dfe3e9"/>
    <text x="397" y="588" fill="#374151">Guide</text>
    <rect x="438" y="568" width="66" height="32" rx="8" fill="#eef1f5" stroke="#dfe3e9"/>
    <text x="471" y="588" fill="#374151">Settings</text>
  </g>

  <text x="24" y="628" fill="#c7ccd6" font-size="12.5" font-weight="600">Main window (Disconnected) — neutral hero, "Last connected", CTA flips to blue Connect</text>
</svg>
