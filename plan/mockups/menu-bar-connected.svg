<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <!-- backdrop / desktop -->
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a63"/>
      <stop offset="1" stop-color="#20293a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="720" height="520" fill="url(#desk)"/>

  <!-- macOS menu bar -->
  <rect x="0" y="0" width="720" height="28" fill="#1f2430" opacity="0.85"/>
  <text x="16" y="19" fill="#ffffff" font-size="13" font-weight="600"></text>
  <text x="42" y="19" fill="#ffffff" font-size="13" font-weight="600">Tunnel Proxy</text>

  <!-- right side status items -->
  <g fill="#ffffff" font-size="13">
    <text x="470" y="19">▲</text>
    <text x="500" y="19">100%</text>
    <text x="560" y="19">Sun 14:32</text>
  </g>
  <!-- our status item icon (highlighted, filled = connected) -->
  <rect x="640" y="2" width="30" height="24" rx="5" fill="#0a84ff"/>
  <text x="647" y="19" fill="#ffffff" font-size="14" font-weight="700">⇅</text>

  <!-- dropdown popover -->
  <g filter="url(#shadow)">
    <rect x="440" y="34" width="264" height="404" rx="12" fill="url(#panel)" stroke="#e2e4e8"/>
    <!-- little arrow to status item -->
    <path d="M655 34 l-9 -9 l9 0 z" fill="#ffffff"/>
  </g>

  <!-- header: status -->
  <circle cx="466" cy="66" r="7" fill="#28c840"/>
  <text x="482" y="71" font-size="15" font-weight="700" fill="#111827">Connected</text>
  <text x="482" y="90" font-size="11.5" fill="#6b7280">Tunnel + HTTP proxy active</text>

  <line x1="456" y1="104" x2="688" y2="104" stroke="#e5e7eb"/>

  <!-- exit ip -->
  <text x="456" y="128" font-size="12" fill="#6b7280">Exit IP</text>
  <text x="688" y="128" font-size="12.5" font-weight="600" fill="#111827" text-anchor="end">203.0.113.47</text>
  <text x="456" y="150" font-size="12" fill="#6b7280">Host</text>
  <text x="688" y="150" font-size="12.5" font-weight="600" fill="#111827" text-anchor="end">root@example.com</text>
  <text x="456" y="172" font-size="12" fill="#6b7280">SOCKS / HTTP</text>
  <text x="688" y="172" font-size="12.5" font-weight="600" fill="#111827" text-anchor="end">1080 / 8118</text>
  <text x="456" y="194" font-size="12" fill="#6b7280">Watchdog</text>
  <text x="688" y="194" font-size="12.5" font-weight="600" fill="#28a745" text-anchor="end">On · every 30s</text>

  <line x1="456" y1="210" x2="688" y2="210" stroke="#e5e7eb"/>

  <!-- big toggle button -->
  <rect x="456" y="224" width="232" height="40" rx="9" fill="#ff3b30"/>
  <text x="572" y="249" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Disconnect</text>

  <!-- system proxy toggle row -->
  <text x="456" y="292" font-size="13" fill="#111827">macOS SOCKS proxy</text>
  <g>
    <rect x="638" y="282" width="44" height="24" rx="12" fill="#28c840"/>
    <circle cx="670" cy="294" r="10" fill="#ffffff"/>
  </g>

  <!-- launch at login row -->
  <text x="456" y="326" font-size="13" fill="#111827">Launch at login</text>
  <g>
    <rect x="638" y="316" width="44" height="24" rx="12" fill="#d1d5db"/>
    <circle cx="650" cy="328" r="10" fill="#ffffff"/>
  </g>

  <line x1="456" y1="350" x2="688" y2="350" stroke="#e5e7eb"/>

  <!-- menu items -->
  <text x="456" y="374" font-size="13" fill="#111827">Open Dashboard…</text>
  <text x="456" y="398" font-size="13" fill="#111827">View Logs…</text>
  <text x="456" y="422" font-size="13" fill="#111827">Settings…</text>

  <!-- caption -->
  <text x="16" y="480" fill="#c7ccd6" font-size="13" font-weight="600">Menu bar popover — Connected state</text>
  <text x="16" y="500" fill="#8a93a6" font-size="11.5">Status item icon filled/blue when connected; primary action flips to Disconnect.</text>
</svg>
