<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#f2f3f5"/>
    </linearGradient>
    <filter id="ws" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="720" height="560" fill="#2c3446"/>

  <g filter="url(#ws)">
    <rect x="60" y="40" width="600" height="480" rx="12" fill="url(#win)" stroke="#dcdfe4"/>
  </g>

  <!-- titlebar -->
  <rect x="60" y="40" width="600" height="44" rx="12" fill="#eceef1"/>
  <rect x="60" y="72" width="600" height="12" fill="#eceef1"/>
  <circle cx="84" cy="62" r="6" fill="#ff5f57"/>
  <circle cx="104" cy="62" r="6" fill="#febc2e"/>
  <circle cx="124" cy="62" r="6" fill="#28c840"/>
  <text x="360" y="66" font-size="13.5" font-weight="700" fill="#3c4250" text-anchor="middle">Settings</text>

  <!-- toolbar tabs -->
  <g font-size="11.5" fill="#6b7280" text-anchor="middle">
    <rect x="250" y="96" width="90" height="34" rx="7" fill="#e5e9ef"/>
    <text x="295" y="117" fill="#1f2937" font-weight="700">Connection</text>
    <text x="380" y="117">Advanced</text>
    <text x="455" y="117">About</text>
  </g>
  <line x1="60" y1="146" x2="660" y2="146" stroke="#e5e7eb"/>

  <!-- form: SSH host -->
  <text x="96" y="182" font-size="12.5" font-weight="600" fill="#374151">SSH Host</text>
  <rect x="96" y="192" width="528" height="34" rx="7" fill="#ffffff" stroke="#cbd2dc"/>
  <text x="110" y="214" font-size="12.5" fill="#111827">root@example.com</text>

  <!-- ports row -->
  <text x="96" y="252" font-size="12.5" font-weight="600" fill="#374151">SOCKS Port</text>
  <rect x="96" y="262" width="250" height="34" rx="7" fill="#ffffff" stroke="#cbd2dc"/>
  <text x="110" y="284" font-size="12.5" fill="#111827">1080</text>

  <text x="374" y="252" font-size="12.5" font-weight="600" fill="#374151">HTTP Proxy Port</text>
  <rect x="374" y="262" width="250" height="34" rx="7" fill="#ffffff" stroke="#cbd2dc"/>
  <text x="388" y="284" font-size="12.5" fill="#111827">8118</text>

  <!-- network service + watchdog -->
  <text x="96" y="322" font-size="12.5" font-weight="600" fill="#374151">macOS Network Service</text>
  <rect x="96" y="332" width="250" height="34" rx="7" fill="#ffffff" stroke="#cbd2dc"/>
  <text x="110" y="354" font-size="12.5" fill="#111827">Wi-Fi</text>
  <path d="M330 346 l6 7 l6 -7" fill="none" stroke="#8a93a6" stroke-width="2"/>

  <text x="374" y="322" font-size="12.5" font-weight="600" fill="#374151">Watchdog Interval (s)</text>
  <rect x="374" y="332" width="250" height="34" rx="7" fill="#ffffff" stroke="#cbd2dc"/>
  <text x="388" y="354" font-size="12.5" fill="#111827">30</text>

  <!-- privoxy config path -->
  <text x="96" y="392" font-size="12.5" font-weight="600" fill="#374151">Privoxy Config Path</text>
  <rect x="96" y="402" width="440" height="34" rx="7" fill="#ffffff" stroke="#cbd2dc"/>
  <text x="110" y="424" font-size="12" fill="#6b7280">/opt/homebrew/etc/privoxy/config</text>
  <rect x="544" y="402" width="80" height="34" rx="7" fill="#e5e9ef" stroke="#cbd2dc"/>
  <text x="584" y="424" font-size="12" fill="#374151" text-anchor="middle">Browse…</text>

  <!-- dependency status -->
  <circle cx="102" cy="460" r="5" fill="#28a745"/>
  <text x="114" y="464" font-size="11.5" fill="#4b5563">privoxy found · ssh found · curl found</text>

  <!-- footer buttons -->
  <line x1="60" y1="480" x2="660" y2="480" stroke="#e5e7eb"/>
  <rect x="452" y="490" width="82" height="34" rx="7" fill="#e5e9ef" stroke="#cbd2dc"/>
  <text x="493" y="512" font-size="12.5" fill="#374151" text-anchor="middle">Cancel</text>
  <rect x="542" y="490" width="82" height="34" rx="7" fill="#0a84ff"/>
  <text x="583" y="512" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">Save</text>

  <text x="60" y="548" fill="#c7ccd6" font-size="12.5" font-weight="600">Settings window — Connection tab (writes .env)</text>
</svg>
