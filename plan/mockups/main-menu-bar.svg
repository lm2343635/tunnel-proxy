<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="ms" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <!-- desktop -->
  <rect width="900" height="560" fill="#2c3446"/>

  <!-- macOS menu bar -->
  <rect x="0" y="0" width="900" height="28" fill="#1f2430" opacity="0.92"/>
  <!-- apple logo -->
  <text x="18" y="19" fill="#ffffff" font-size="14"></text>
  <!-- app menus (left side) -->
  <g font-size="13" fill="#ffffff">
    <text x="44" y="19" font-weight="700">Tunnel Proxy</text>
    <!-- Connection is highlighted/open -->
    <rect x="150" y="2" width="92" height="24" rx="4" fill="#0a84ff"/>
    <text x="160" y="19" font-weight="600">Connection</text>
    <text x="262" y="19">View</text>
    <text x="316" y="19">Window</text>
    <text x="386" y="19">Help</text>
  </g>
  <!-- right side status items -->
  <g fill="#ffffff" font-size="13" opacity="0.9">
    <text x="770" y="19">100%</text>
    <text x="828" y="19">14:32</text>
  </g>
  <!-- our status item (shield) -->
  <text x="726" y="20" fill="#ffffff" font-size="14" font-weight="700">⛊</text>

  <!-- ============ Connection menu (open) ============ -->
  <g filter="url(#ms)">
    <rect x="150" y="30" width="240" height="222" rx="8" fill="#f4f5f7" stroke="#d7dae0"/>
  </g>
  <g font-size="12.5" fill="#1f2937">
    <!-- Disconnect (connected state) -->
    <rect x="154" y="36" width="232" height="24" rx="5" fill="#0a84ff"/>
    <text x="166" y="52" fill="#ffffff">Disconnect</text>
    <text x="372" y="52" fill="#dbeaff" text-anchor="end">⌘K</text>

    <text x="166" y="78">Reconnect</text>
    <text x="372" y="78" fill="#9aa3b2" text-anchor="end">⌘R</text>

    <line x1="162" y1="90" x2="378" y2="90" stroke="#e2e5ea"/>

    <!-- Server submenu -->
    <text x="166" y="110">Server</text>
    <text x="372" y="110" fill="#9aa3b2" text-anchor="end">▸</text>

    <line x1="162" y1="122" x2="378" y2="122" stroke="#e2e5ea"/>

    <!-- toggles (checkmarks) -->
    <text x="166" y="142">macOS SOCKS proxy</text>
    <text x="360" y="142" fill="#0a84ff" text-anchor="end">✓</text>

    <text x="166" y="166">Auto-reconnect (watchdog)</text>
    <text x="360" y="166" fill="#0a84ff" text-anchor="end">✓</text>

    <text x="166" y="190">Show network speed</text>

    <line x1="162" y1="202" x2="378" y2="202" stroke="#e2e5ea"/>

    <text x="166" y="222">Remove All Proxies</text>
    <text x="166" y="244">Set Claude Code Proxy</text>
  </g>

  <!-- Server submenu (cascaded) -->
  <g filter="url(#ms)">
    <rect x="392" y="98" width="180" height="86" rx="8" fill="#f4f5f7" stroke="#d7dae0"/>
  </g>
  <g font-size="12.5" fill="#1f2937">
    <rect x="396" y="104" width="172" height="24" rx="5" fill="#0a84ff"/>
    <text x="406" y="120" fill="#ffffff">✓ server-a</text>
    <text x="406" y="146">server-b</text>
    <text x="406" y="170">server-c</text>
  </g>

  <!-- ============ small floating previews of the other menus ============ -->
  <!-- View menu preview -->
  <g filter="url(#ms)">
    <rect x="600" y="330" width="220" height="150" rx="8" fill="#f4f5f7" stroke="#d7dae0"/>
  </g>
  <text x="612" y="352" font-size="11.5" font-weight="700" fill="#8a93a6">VIEW MENU</text>
  <g font-size="12.5" fill="#1f2937">
    <text x="612" y="378">Logs</text>
    <text x="806" y="378" fill="#9aa3b2" text-anchor="end">⌘L</text>
    <text x="612" y="402">Statistics</text>
    <text x="806" y="402" fill="#9aa3b2" text-anchor="end">⌘⇧S</text>
    <line x1="608" y1="414" x2="812" y2="414" stroke="#e2e5ea"/>
    <text x="612" y="436">Show Menu Bar Icon</text>
    <text x="800" y="436" fill="#0a84ff" text-anchor="end">✓</text>
    <line x1="608" y1="448" x2="812" y2="448" stroke="#e2e5ea"/>
    <text x="612" y="470">Tunnel Proxy Window</text>
  </g>

  <!-- Help menu preview -->
  <g filter="url(#ms)">
    <rect x="80" y="360" width="220" height="80" rx="8" fill="#f4f5f7" stroke="#d7dae0"/>
  </g>
  <text x="92" y="382" font-size="11.5" font-weight="700" fill="#8a93a6">HELP MENU</text>
  <g font-size="12.5" fill="#1f2937">
    <text x="92" y="408">User Guide</text>
    <text x="286" y="408" fill="#9aa3b2" text-anchor="end">⌘?</text>
    <text x="92" y="430">Tunnel Proxy Help…</text>
  </g>

  <!-- App menu preview -->
  <g filter="url(#ms)">
    <rect x="80" y="470" width="220" height="78" rx="8" fill="#f4f5f7" stroke="#d7dae0"/>
  </g>
  <text x="92" y="490" font-size="11.5" font-weight="700" fill="#8a93a6">APP MENU (auto)</text>
  <g font-size="12.5" fill="#1f2937">
    <text x="92" y="514">About Tunnel Proxy</text>
    <text x="92" y="536">Settings…</text>
    <text x="286" y="536" fill="#9aa3b2" text-anchor="end">⌘,</text>
  </g>

  <!-- caption -->
  <text x="360" y="516" fill="#c7ccd6" font-size="12.5" font-weight="600">Main menu bar (app promoted to .regular while window is open)</text>
  <text x="360" y="536" fill="#8a93a6" font-size="11.5">Connection · View · Window · Help — mirrors the window/popover, with keyboard shortcuts</text>
</svg>
