<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="glowY" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffcc00" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="knobG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef0f3"/>
    </linearGradient>
    <filter id="pcard" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="ksh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="mrot" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#f0a500"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="#ffffff"/>

  <!-- ============ CONNECTING ============ -->
  <g filter="url(#pcard)">
    <rect x="40" y="32" width="300" height="360" rx="14" fill="#fbfbfd" stroke="#e6e8ec"/>
  </g>
  <text x="190" y="66" font-size="13" font-weight="800" fill="#b07d00" text-anchor="middle">CONNECTING</text>

  <!-- soft pulse glow -->
  <circle cx="190" cy="176" r="96" fill="url(#glowY)"/>
  <!-- base ring -->
  <circle cx="190" cy="176" r="62" fill="none" stroke="#eceef1" stroke-width="11"/>
  <!-- sweeping arc (indeterminate) — ~30% of circle -->
  <path d="M190 114 a62 62 0 0 1 53.7 31" fill="none" stroke="#ffcc00" stroke-width="11" stroke-linecap="round"/>
  <!-- rotation hint arrows -->
  <path d="M262 158 a76 76 0 0 1 8 34" fill="none" stroke="#f0a500" stroke-width="2" stroke-dasharray="2 5" marker-end="url(#mrot)"/>
  <!-- knob -->
  <circle cx="190" cy="176" r="48" fill="url(#knobG)" filter="url(#ksh)"/>
  <path d="M173 162 a22 22 0 1 0 34 0" fill="none" stroke="#b8901f" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="190" y1="153" x2="190" y2="177" stroke="#b8901f" stroke-width="4.5" stroke-linecap="round"/>

  <text x="190" y="288" font-size="20" font-weight="800" fill="#3a3f48" text-anchor="middle">Connecting…</text>
  <text x="190" y="310" font-size="12.5" fill="#7d8697" text-anchor="middle">Establishing tunnel…</text>
  <!-- animation caption -->
  <text x="190" y="352" font-size="11" fill="#a4863a" text-anchor="middle">arc sweeps ↻ + gentle breathing pulse</text>
  <text x="190" y="368" font-size="10.5" fill="#c0a866" text-anchor="middle">(Reduce Motion → static ring + spinner)</text>

  <!-- ============ DISCONNECTED ============ -->
  <g filter="url(#pcard)">
    <rect x="380" y="32" width="300" height="360" rx="14" fill="#fbfbfd" stroke="#e6e8ec"/>
  </g>
  <text x="530" y="66" font-size="13" font-weight="800" fill="#8a93a6" text-anchor="middle">DISCONNECTED</text>

  <!-- base grey ring only -->
  <circle cx="530" cy="176" r="62" fill="none" stroke="#e4e7eb" stroke-width="11"/>
  <!-- knob (muted) -->
  <circle cx="530" cy="176" r="48" fill="#f5f6f8" stroke="#e4e7eb" filter="url(#ksh)"/>
  <path d="M513 162 a22 22 0 1 0 34 0" fill="none" stroke="#9aa1ad" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="530" y1="153" x2="530" y2="177" stroke="#9aa1ad" stroke-width="4.5" stroke-linecap="round"/>

  <text x="530" y="288" font-size="20" font-weight="800" fill="#3a3f48" text-anchor="middle">Disconnected</text>
  <text x="530" y="310" font-size="12.5" fill="#7d8697" text-anchor="middle">Traffic goes out directly</text>
  <text x="530" y="352" font-size="11" fill="#9aa1ad" text-anchor="middle">tap the power toggle to connect</text>

  <text x="24" y="424" fill="#9aa1ad" font-size="12.5" font-weight="600">Connection tab states — the ring sweeps while connecting, fills solid when connected (see other mockup), rests grey when off</text>
</svg>
