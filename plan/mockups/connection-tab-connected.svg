<svg xmlns="http://www.w3.org/2000/svg" width="720" height="600" viewBox="0 0 720 600" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#f2f3f5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#32d74b" stop-opacity="0.42"/>
      <stop offset="0.65" stop-color="#32d74b" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#32d74b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="knob" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0f6f1"/>
    </linearGradient>
    <filter id="ws" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="cardsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="knobsh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1a7f2e" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="720" height="600" fill="#2c3446"/>

  <!-- window -->
  <g filter="url(#ws)">
    <rect x="40" y="24" width="640" height="552" rx="12" fill="url(#win)" stroke="#dcdfe4"/>
  </g>

  <!-- titlebar -->
  <rect x="40" y="24" width="640" height="40" rx="12" fill="#eceef1"/>
  <rect x="40" y="52" width="640" height="12" fill="#eceef1"/>
  <circle cx="62" cy="44" r="6" fill="#ff5f57"/>
  <circle cx="82" cy="44" r="6" fill="#febc2e"/>
  <circle cx="102" cy="44" r="6" fill="#28c840"/>
  <text x="360" y="48" font-size="13" font-weight="700" fill="#3c4250" text-anchor="middle">Tunnel Proxy</text>

  <!-- ===== TAB STRIP (Connection selected) ===== -->
  <rect x="40" y="64" width="640" height="56" fill="#f4f5f7"/>
  <line x1="40" y1="120" x2="680" y2="120" stroke="#e0e2e6"/>
  <rect x="52" y="74" width="90" height="38" rx="7" fill="#e2e6ec"/>
  <g text-anchor="middle" font-size="10.5">
    <!-- Connection (selected) -->
    <circle cx="97" cy="87" r="8" fill="none" stroke="#1f6bff" stroke-width="1.6"/>
    <line x1="97" y1="82" x2="97" y2="88" stroke="#1f6bff" stroke-width="1.6"/>
    <text x="97" y="107" fill="#1f6bff" font-weight="700">Connection</text>
    <!-- Servers -->
    <rect x="176" y="80" width="18" height="14" rx="3" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="185" y="107" fill="#4b5563">Servers</text>
    <!-- Tunnel -->
    <circle cx="262" cy="87" r="7" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <line x1="255" y1="87" x2="269" y2="87" stroke="#6b7280" stroke-width="1.2"/>
    <text x="262" y="107" fill="#4b5563">Tunnel</text>
    <!-- Logs -->
    <rect x="333" y="79" width="13" height="16" rx="2" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="339" y="107" fill="#4b5563">Logs</text>
    <!-- Stats -->
    <g fill="#6b7280"><rect x="401" y="87" width="4" height="8"/><rect x="408" y="83" width="4" height="12"/><rect x="415" y="80" width="4" height="15"/></g>
    <text x="410" y="107" fill="#4b5563">Stats</text>
    <!-- Advanced -->
    <circle cx="486" cy="86" r="5" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <circle cx="495" cy="91" r="4" fill="none" stroke="#6b7280" stroke-width="1.4"/>
    <text x="490" y="107" fill="#4b5563">Advanced</text>
    <!-- Tools -->
    <path d="M566 80 l6 6 -4 4 -6 -6 z" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="570" y="107" fill="#4b5563">Tools</text>
    <!-- About -->
    <circle cx="636" cy="87" r="8" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="636" y="91" font-size="11" font-weight="800" fill="#6b7280">i</text>
    <text x="636" y="107" fill="#4b5563">About</text>
  </g>

  <!-- ===== CONNECTION TAB CONTENT ===== -->
  <!-- glow behind toggle -->
  <circle cx="360" cy="238" r="118" fill="url(#glow)"/>
  <!-- power toggle: full green ring -->
  <circle cx="360" cy="238" r="66" fill="none" stroke="#eaf3ec" stroke-width="12"/>
  <circle cx="360" cy="238" r="66" fill="none" stroke="#32d74b" stroke-width="12" stroke-linecap="round"/>
  <!-- knob face -->
  <circle cx="360" cy="238" r="52" fill="url(#knob)" filter="url(#knobsh)"/>
  <!-- power glyph -->
  <g stroke="#1f9d3a" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M360 214 a26 26 0 1 1 -0.1 0" transform="rotate(0 360 238)"/>
  </g>
  <line x1="360" y1="210" x2="360" y2="238" stroke="#1f9d3a" stroke-width="5" stroke-linecap="round"/>
  <!-- clean power glyph overlay (arc with a gap at top + vertical bar) -->
  <path d="M341 222 a24 24 0 1 0 38 0" fill="none" stroke="#1f9d3a" stroke-width="5" stroke-linecap="round"/>
  <line x1="360" y1="212" x2="360" y2="240" stroke="#1f9d3a" stroke-width="5" stroke-linecap="round"/>

  <!-- status -->
  <text x="360" y="345" font-size="24" font-weight="800" fill="#0d223d" text-anchor="middle">Connected</text>
  <text x="360" y="368" font-size="13" fill="#5b6b82" text-anchor="middle">Tunnel + HTTP proxy active</text>

  <!-- exit-ip chip -->
  <rect x="256" y="384" width="208" height="38" rx="10" fill="#ffffff" stroke="#d7ecdb" filter="url(#cardsh)"/>
  <circle cx="278" cy="403" r="4" fill="#32d74b"/>
  <text x="292" y="400" font-size="9.5" fill="#7d8697">EXIT IP</text>
  <text x="292" y="414" font-size="13" font-weight="700" fill="#0a3d91" font-family="'SF Mono', Menlo, monospace">203.0.113.47</text>
  <!-- server picker -->
  <text x="256" y="452" font-size="11.5" fill="#7d8697">Server</text>
  <rect x="304" y="438" width="160" height="26" rx="6" fill="#ffffff" stroke="#d7dbe1"/>
  <text x="318" y="455" font-size="12" font-weight="600" fill="#1f2937">server-a</text>
  <text x="448" y="455" font-size="11" fill="#8a93a6">▾</text>

  <!-- ===== QUICK OPTIONS CARD ===== -->
  <text x="200" y="490" font-size="11" font-weight="700" fill="#8a93a6" letter-spacing="0.4">QUICK OPTIONS</text>
  <g filter="url(#cardsh)">
    <rect x="200" y="500" width="320" height="72" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
  </g>
  <text x="216" y="524" font-size="12.5" fill="#1f2937">Route Mac traffic through proxy</text>
  <rect x="468" y="514" width="40" height="22" rx="11" fill="#28c840"/><circle cx="497" cy="525" r="9" fill="#fff"/>
  <line x1="216" y1="544" x2="504" y2="544" stroke="#eef0f3"/>
  <text x="216" y="564" font-size="12.5" fill="#1f2937">Auto-reconnect (watchdog)</text>
  <rect x="468" y="554" width="40" height="22" rx="11" fill="#28c840"/><circle cx="497" cy="565" r="9" fill="#fff"/>

  <text x="24" y="592" fill="#c7ccd6" font-size="12.5" font-weight="600">Connection tab (Light, connected) — animated power toggle · status · exit-IP chip · server · SOCKS + watchdog quick options</text>
</svg>
