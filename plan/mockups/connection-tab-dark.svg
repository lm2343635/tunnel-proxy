  <circle cx="102" cy="44" r="6" fill="#28c840"/>
  <text x="360" y="48" font-size="13" font-weight="700" fill="#c9ccd2" text-anchor="middle">Tunnel Proxy</text>

  <!-- ===== TAB STRIP (Connection selected) ===== -->
