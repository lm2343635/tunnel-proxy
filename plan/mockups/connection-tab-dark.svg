  <text x="200" y="490" font-size="11" font-weight="700" fill="#7f8794" letter-spacing="0.4">QUICK OPTIONS</text>
  <rect x="200" y="500" width="320" height="72" rx="10" fill="#2e3035" stroke="#3a3d43"/>
  <text x="216" y="524" font-size="12.5" fill="#dfe2e8">Route Mac traffic through proxy</text>
  <rect x="468" y="514" width="40" height="22" rx="11" fill="#32d74b"/><circle cx="497" cy="525" r="9" fill="#fff"/>
  <line x1="216" y1="544" x2="504" y2="544" stroke="#37393f"/>
  <text x="216" y="564" font-size="12.5" fill="#dfe2e8">Auto-reconnect (watchdog)</text>
  <rect x="468" y="554" width="40" height="22" rx="11" fill="#32d74b"/><circle cx="497" cy="565" r="9" fill="#fff"/>

  <text x="24" y="592" fill="#5f6572" font-size="12.5" font-weight="600">Connection tab (Dark, adaptive proof) — ring/glow use accent + statusColor; no hard-coded light values</text>
</svg>
