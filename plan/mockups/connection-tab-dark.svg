    <circle cx="636" cy="87" r="8" fill="none" stroke="#9aa1ac" stroke-width="1.6"/>
    <text x="636" y="91" font-size="11" font-weight="800" fill="#9aa1ac">i</text>
    <text x="636" y="107" fill="#a9b0ba">About</text>
  </g>

  <!-- ===== CONNECTION CONTENT ===== -->
  <circle cx="360" cy="238" r="118" fill="url(#glowD)"/>
  <circle cx="360" cy="238" r="66" fill="none" stroke="#2c3630" stroke-width="12"/>
  <circle cx="360" cy="238" r="66" fill="none" stroke="#32d74b" stroke-width="12" stroke-linecap="round"/>
  <circle cx="360" cy="238" r="52" fill="url(#knobD)" filter="url(#knobshD)"/>
  <path d="M341 222 a24 24 0 1 0 38 0" fill="none" stroke="#5fe878" stroke-width="5" stroke-linecap="round"/>
  <line x1="360" y1="212" x2="360" y2="240" stroke="#5fe878" stroke-width="5" stroke-linecap="round"/>

