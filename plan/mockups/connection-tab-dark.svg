<svg xmlns="http://www.w3.org/2000/svg" width="720" height="600" viewBox="0 0 720 600" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="winD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/>
      <stop offset="1" stop-color="#232529"/>
    </linearGradient>
    <radialGradient id="glowD" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#32d74b" stop-opacity="0.40"/>
      <stop offset="0.65" stop-color="#32d74b" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#32d74b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="knobD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f3a31"/>
      <stop offset="1" stop-color="#28312a"/>
    </linearGradient>
    <filter id="wsD" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="knobshD" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#32d74b" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="600" fill="#15161a"/>

  <g filter="url(#wsD)">
    <rect x="40" y="24" width="640" height="552" rx="12" fill="url(#winD)" stroke="#3a3d43"/>
  </g>

  <!-- titlebar -->
