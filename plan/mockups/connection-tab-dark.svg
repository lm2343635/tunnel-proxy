    <line x1="255" y1="87" x2="269" y2="87" stroke="#9aa1ac" stroke-width="1.2"/>
    <text x="262" y="107" fill="#a9b0ba">Tunnel</text>
    <rect x="333" y="79" width="13" height="16" rx="2" fill="none" stroke="#9aa1ac" stroke-width="1.6"/>
