    <g fill="#9aa1ac"><rect x="401" y="87" width="4" height="8"/><rect x="408" y="83" width="4" height="12"/><rect x="415" y="80" width="4" height="15"/></g>
    <text x="410" y="107" fill="#a9b0ba">Stats</text>
