<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="win3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#f2f3f5"/>
    </linearGradient>
    <filter id="ws3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="cardsh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="720" height="540" fill="#2c3446"/>

  <g filter="url(#ws3)">
    <rect x="40" y="24" width="640" height="492" rx="12" fill="url(#win3)" stroke="#dcdfe4"/>
  </g>

  <!-- titlebar -->
  <rect x="40" y="24" width="640" height="40" rx="12" fill="#eceef1"/>
  <rect x="40" y="52" width="640" height="12" fill="#eceef1"/>
  <circle cx="62" cy="44" r="6" fill="#ff5f57"/>
  <circle cx="82" cy="44" r="6" fill="#febc2e"/>
  <circle cx="102" cy="44" r="6" fill="#28c840"/>
  <text x="360" y="48" font-size="13" font-weight="700" fill="#3c4250" text-anchor="middle">Tunnel Proxy</text>

  <!-- ===== TAB STRIP (Stats selected) — no header above ===== -->
  <rect x="40" y="64" width="640" height="56" fill="#f4f5f7"/>
  <line x1="40" y1="120" x2="680" y2="120" stroke="#e0e2e6"/>
  <rect x="386" y="74" width="60" height="38" rx="7" fill="#e2e6ec"/>
  <g text-anchor="middle" font-size="10.5">
    <!-- Connection -->
    <circle cx="97" cy="87" r="8" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <line x1="97" y1="82" x2="97" y2="88" stroke="#6b7280" stroke-width="1.6"/>
    <text x="97" y="107" fill="#4b5563">Connection</text>
    <!-- Servers -->
    <rect x="177" y="80" width="18" height="14" rx="3" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="186" y="107" fill="#4b5563">Servers</text>
    <!-- Tunnel -->
    <circle cx="262" cy="87" r="7" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <line x1="255" y1="87" x2="269" y2="87" stroke="#6b7280" stroke-width="1.2"/>
    <line x1="262" y1="80" x2="262" y2="94" stroke="#6b7280" stroke-width="1.2"/>
    <text x="262" y="107" fill="#4b5563">Tunnel</text>
    <!-- Logs -->
    <rect x="333" y="79" width="13" height="16" rx="2" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="339" y="107" fill="#4b5563">Logs</text>
    <!-- Stats (selected) -->
    <g fill="#1f6bff"><rect x="401" y="87" width="4" height="8"/><rect x="408" y="83" width="4" height="12"/><rect x="415" y="80" width="4" height="15"/></g>
    <text x="410" y="107" fill="#1f6bff" font-weight="700">Stats</text>
    <!-- Advanced -->
    <circle cx="486" cy="86" r="5" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <circle cx="495" cy="91" r="4" fill="none" stroke="#6b7280" stroke-width="1.4"/>
    <text x="490" y="107" fill="#4b5563">Advanced</text>
    <!-- Tools -->
    <path d="M566 80 l6 6 -4 4 -6 -6 z" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="570" y="107" fill="#4b5563">Tools</text>
    <!-- About -->
    <circle cx="636" cy="87" r="8" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    <text x="636" y="91" font-size="11" font-weight="800" fill="#6b7280">i</text>
    <text x="636" y="107" fill="#4b5563">About</text>
  </g>

  <!-- ===== TAB CONTENT: Statistics (wide data view) ===== -->
  <!-- range segmented + server filter -->
  <rect x="72" y="136" width="240" height="26" rx="6" fill="#e7eaef" stroke="#d7dbe1"/>
  <rect x="74" y="138" width="60" height="22" rx="5" fill="#ffffff"/>
  <g font-size="11" text-anchor="middle" fill="#374151">
    <text x="104" y="153" font-weight="700">Today</text>
    <text x="164" y="153">Week</text>
    <text x="224" y="153">Month</text>
    <text x="284" y="153">All</text>
  </g>
  <rect x="540" y="136" width="108" height="26" rx="6" fill="#ffffff" stroke="#d7dbe1"/>
  <text x="556" y="153" font-size="11" fill="#374151">All servers ▾</text>

  <!-- totals row -->
  <g filter="url(#cardsh3)">
    <rect x="72" y="176" width="180" height="60" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
    <rect x="270" y="176" width="180" height="60" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
    <rect x="468" y="176" width="180" height="60" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
  </g>
  <text x="88" y="198" font-size="10.5" fill="#7d8697">Downloaded</text>
  <text x="88" y="222" font-size="18" font-weight="800" fill="#1f6bff">4.82 GB</text>
  <text x="286" y="198" font-size="10.5" fill="#7d8697">Uploaded</text>
  <text x="286" y="222" font-size="18" font-weight="800" fill="#28c840">812 MB</text>
  <text x="484" y="198" font-size="10.5" fill="#7d8697">Sessions</text>
  <text x="484" y="222" font-size="18" font-weight="800" fill="#1f2937">7</text>

  <!-- chart -->
  <text x="72" y="258" font-size="11" font-weight="700" fill="#8a93a6" letter-spacing="0.4">TRAFFIC OVER TIME</text>
  <g filter="url(#cardsh3)">
    <rect x="72" y="268" width="576" height="160" rx="10" fill="#ffffff" stroke="#e6e8ec"/>
  </g>
  <!-- baseline + bars -->
  <line x1="96" y1="408" x2="624" y2="408" stroke="#e6e8ec"/>
  <g>
    <rect x="120" y="368" width="20" height="40" fill="#9dc4ff"/><rect x="120" y="358" width="20" height="10" fill="#8ee29e"/>
    <rect x="180" y="338" width="20" height="70" fill="#6ba8ff"/><rect x="180" y="326" width="20" height="12" fill="#8ee29e"/>
    <rect x="240" y="320" width="20" height="88" fill="#4f95ff"/><rect x="240" y="306" width="20" height="14" fill="#66d47c"/>
    <rect x="300" y="348" width="20" height="60" fill="#6ba8ff"/><rect x="300" y="338" width="20" height="10" fill="#8ee29e"/>
    <rect x="360" y="300" width="20" height="108" fill="#3d8bff"/><rect x="360" y="284" width="20" height="16" fill="#4fc766"/>
    <rect x="420" y="332" width="20" height="76" fill="#6ba8ff"/><rect x="420" y="320" width="20" height="12" fill="#8ee29e"/>
    <rect x="480" y="356" width="20" height="52" fill="#9dc4ff"/><rect x="480" y="346" width="20" height="10" fill="#8ee29e"/>
    <rect x="540" y="374" width="20" height="34" fill="#9dc4ff"/><rect x="540" y="366" width="20" height="8" fill="#8ee29e"/>
  </g>
  <!-- legend -->
  <rect x="500" y="280" width="10" height="10" rx="2" fill="#4f95ff"/><text x="516" y="289" font-size="10" fill="#5b6b82">Down</text>
  <rect x="560" y="280" width="10" height="10" rx="2" fill="#4fc766"/><text x="576" y="289" font-size="10" fill="#5b6b82">Up</text>

  <!-- status bar -->
  <line x1="40" y1="480" x2="680" y2="480" stroke="#e6e8ec"/>
  <circle cx="72" cy="498" r="5" fill="#28c840"/>
  <text x="86" y="502" font-size="11" fill="#7d8697">Recording · flushes every 60s</text>
  <text x="632" y="502" font-size="11" fill="#9aa3b2" text-anchor="end">Export CSV ⤓</text>

  <text x="24" y="532" fill="#c7ccd6" font-size="12.5" font-weight="600">Unified window (Statistics tab) — the wide data views now live in the same window; no header, tabs under the titlebar</text>
</svg>
